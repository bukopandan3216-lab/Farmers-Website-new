<!-- ============================================================
     BUYER PROFILE PAGE
     ============================================================ -->
<div class="page" id="page-buyer-profile">
  <div class="cart-page" style="max-width:900px;">
    <h1>My Account</h1>
    <p style="color:var(--gray); margin-bottom:32px;">Manage your profile and view your order history.</p>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:32px; margin-top:32px;">
      <!-- Personal Information Card -->
      <div class="contact-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;">
          <div>
            <h2 style="font-size:18px; margin-bottom:4px;">📋 Personal Information</h2>
            <p style="color:var(--gray); margin:0; font-size:14px;">Update your profile any time.</p>
          </div>
          <button class="submit-btn" type="button" style="background:#2563eb;" onclick="toggleBuyerEditForm()">Edit Profile</button>
        </div>
        <div id="buyer-profile-info" style="display:grid; gap:16px;"></div>
        <div id="buyer-edit-form" style="display:none; margin-top:24px;">
          <div class="form-group"><label>Full Name</label><input type="text" id="edit-buyer-fullname" placeholder="Full Name"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="edit-buyer-email" placeholder="Email"/></div>
          <div class="form-group"><label>Contact Number</label><input type="tel" id="edit-buyer-contact" placeholder="Contact Number"/></div>
          <div class="form-group"><label>Address</label><textarea id="edit-buyer-address" placeholder="Complete Address"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>City</label><input type="text" id="edit-buyer-city" placeholder="City"/></div>
            <div class="form-group"><label>Province</label><input type="text" id="edit-buyer-province" placeholder="Province"/></div>
          </div>
          <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:16px;">
            <button class="submit-btn" type="button" onclick="saveBuyerProfile()">Save Changes</button>
            <button class="submit-btn" type="button" style="background:#6b7280;" onclick="toggleBuyerEditForm(true)">Cancel</button>
          </div>
        </div>
        <button class="submit-btn" style="margin-top:20px; width:100%;" onclick="showPage('home')">← Back to Home</button>
      </div>
      
      <!-- Order History Card -->
      <div class="contact-card">
        <h2 style="font-size:18px; margin-bottom:20px;">🛒 Order History</h2>
        <div id="buyer-orders" style="display:grid; gap:12px; max-height:400px; overflow-y:auto;"></div>
      </div>
    </div>

    <!-- Additional Buyer Stats -->
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-top:32px;">
      <div style="background:#e0f2fe; padding:20px; border-radius:12px; text-align:center;">
        <div style="font-size:28px; font-weight:bold; color:#0369a1;" id="buyer-total-orders">0</div>
        <div style="color:#0369a1; margin-top:8px;">Total Orders</div>
      </div>
      <div style="background:#ecfdf5; padding:20px; border-radius:12px; text-align:center;">
        <div style="font-size:28px; font-weight:bold; color:#10b981;" id="buyer-total-spent">₱0</div>
        <div style="color:#10b981; margin-top:8px;">Total Spent</div>
      </div>
      <div style="background:#fef3c7; padding:20px; border-radius:12px; text-align:center;">
        <div style="font-size:28px; font-weight:bold; color:#f59e0b;" id="buyer-favorite-category">-</div>
        <div style="color:#f59e0b; margin-top:8px;">Favorite Category</div>
      </div>
      <div style="background:#fce7f3; padding:20px; border-radius:12px; text-align:center;">
        <div style="font-size:28px; font-weight:bold; color:#be185d;" id="buyer-member-days">0</div>
        <div style="color:#be185d; margin-top:8px;">Days as Member</div>
      </div>
    </div>
  </div>
</div>
